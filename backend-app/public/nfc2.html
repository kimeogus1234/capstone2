<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smartstore - 앱 다운로드</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #eff6ff, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .app-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .icon-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
        }

        /* 다운로드 안내 문구 */
        .download-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* 🔥 항상 좌우 유지 */
        .download-buttons {
            display: flex;
            gap: 4%;
            width: 100%;
        }

        /* 버튼을 화면 비율에 맞게 자동 조절 */
        .store-button {
            flex: 1;
            /* 50%씩 자동 분배 */
        }

        .store-button img {
            width: 100%;
            /* 부모 크기에 맞춤 */
            height: auto;
            /* 비율 유지 */
            border-radius: 12px;
            transition: transform 0.2s ease;
        }

        .store-button img:hover {
            transform: scale(1.05);
        }

        .footer-text {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- 앱 아이콘 -->
        <div class="app-icon">
            <div class="icon-wrapper">
                <img src="/public/images/appicon.png" alt="앱 아이콘">
            </div>
        </div>

        <h1>SmartStore</h1>
        <p class="subtitle">NFC 기능 및 마트 서비스 이용을 위해 스마트스토어 앱 설치가 필요합니다.
            앱을 설치하신 후 다시 태그하시면 바로 이용하실 수 있습니다.</p>

        <!-- 안내 문구 -->
        <div class="download-title">
            다운로드하려면 아래 버튼을 클릭하세요
        </div>

        <!-- 🔥 항상 좌우 배치 -->
        <div class="download-buttons">

            <!-- 🍎 앱스토어 -->
            <a href="https://apps.apple.com/kr/app/%EB%84%A4%EC%9D%B4%EB%B2%84-naver/id393499958" target="_blank"
                class="store-button">
                <img src="/public/images/appstore.png" alt="App Store">
            </a>

            <!-- 🤖 구글플레이 -->
            <a href="https://play.google.com/store/apps/details?id=com.nhn.android.search" target="_blank"
                class="store-button">
                <img src="/public/images/playstore.png" alt="Google Play">
            </a>

        </div>

        <p class="footer-text">버전 1.0.0 · 무료 다운로드</p>

    </div>
</body>

</html>
