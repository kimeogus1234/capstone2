<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Smart Store 앱 안내</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-primary {
            background: #3182f6;
            color: white;
        }

        .btn-secondary {
            background: #e5e8eb;
            color: #333;
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">🛒</div>
        <h1>Smart Store 앱이 필요합니다</h1>
        <p>
            Smart Store는 NFC 태그를 스캔하여<br>
            상품을 빠르게 확인하고 장바구니에 담고<br>
            간편하게 결제할 수 있는 스마트 매장 앱입니다.
        </p>

        <!-- Android -->
        <a href="https://play.google.com/store/apps/details?id=com.nhn.android.search" class="btn btn-primary">
            Google Play에서 다운로드
        </a>

        <!-- iOS -->
        <a href="https://apps.apple.com/kr/app/%EB%84%A4%EC%9D%B4%EB%B2%84-naver/id393499958" class="btn btn-secondary">
            App Store에서 다운로드
        </a>

    </div>

</body>

</html>
