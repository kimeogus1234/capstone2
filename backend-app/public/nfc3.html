<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsumerApp | 쿠팡처럼 쇼핑하기</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #0073e9;
            margin-bottom: 20px;
        }

        .info-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .sub-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-app {
            background-color: #0073e9;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-web {
            margin-top: 20px;
            color: #0073e9;
            text-decoration: underline;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="logo">ConsumerApp</div>
    <div class="info-text">앱으로 이동하시겠습니까?</div>
    <div class="sub-text">앱을 사용하시면 더 빠르고<br />편리한 쇼핑이 가능합니다.</div>

    <button class="btn-app" onclick="goToApp()">앱으로 계속하기</button>

    <button class="btn-web" onclick="stayInWeb()">웹 브라우저에서 보기</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const appUrl = `consumerapp://product/${productId}`;

        function goToApp() {
            if (!productId) return alert("상품 정보를 찾을 수 없습니다.");

            // 💡 앱 호출
            window.location.href = appUrl;

            // 💡 0.5초 뒤에도 반응이 없으면 (앱이 안깔려있으면) 알림
            setTimeout(() => {
                if (confirm("앱이 설치되어 있지 않은 것 같습니다. 다운로드 페이지로 이동할까요?")) {
                    // 여기에 플레이스토어 주소를 넣으면 쿠팡과 100% 동일해집니다.
                    window.location.href = "https://play.google.com/store";
                }
            }, 1000);
        }

        function stayInWeb() {
            alert("웹 버전 준비 중입니다.");
        }

        // 페이지 접속하자마자 자동으로 물어보고 싶다면 아래 주석 해제
        // window.onload = goToApp;
    </script>
</body>

</html>
